name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build and upload release asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: |
          cd custom_components/motogp_sensor
          zip -r ../../motogp_sensor.zip . \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude "tests/*" \
            --exclude "*.md" \
            --exclude "CONTRIBUTING.md" \
            --exclude "LICENSE*"

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: motogp_sensor.zip
