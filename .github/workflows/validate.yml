name: Validate

on:
  push:
    branches: [main, dev]
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  validate:
    name: Validate with HACS Action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
